name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    name: Draft GitHub Release
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11.7'

    - name: Cache PlatformIO
      uses: actions/cache@v5
      with:
        path: |
          ~/.platformio
          ~/.cache/pip
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Extract version from constants.h
      id: version
      working-directory: source
      run: |
        VERSION=$(grep -oP 'FIRMWARE_BUILD_VERSION_MAJOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_MINOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_PATCH "\K\w+' include/constants.h)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "📌 constants.h version: $VERSION"

    - name: Verify tag matches constants.h
      run: |
        TAG="${GITHUB_REF#refs/tags/v}"
        CONST="${{ steps.version.outputs.VERSION }}"
        echo "Tag:        v$TAG"
        echo "constants.h: $CONST"
        if [ "$TAG" != "$CONST" ]; then
          echo "::error::Tag v$TAG does not match constants.h version $CONST. Bump constants.h before tagging."
          exit 1
        fi
        echo "✅ Tag and constants.h agree"

    - name: Build esp32s3-prod
      working-directory: source
      run: |
        echo "🏗️ Building firmware for esp32s3-prod..."
        pio run -e esp32s3-prod
        echo "✅ Build completed"

    - name: Prepare release artifacts
      working-directory: source
      run: |
        mkdir -p release
        cp .pio/build/esp32s3-prod/firmware.bin release/energyme_home_${{ steps.version.outputs.VERSION }}.bin
        cp .pio/build/esp32s3-prod/firmware.elf release/energyme_home_${{ steps.version.outputs.VERSION }}.elf

    - name: Create draft GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        files: |
          source/release/energyme_home_${{ steps.version.outputs.VERSION }}.bin
          source/release/energyme_home_${{ steps.version.outputs.VERSION }}.elf

    - name: Release summary
      run: |
        echo "### 🚀 Draft Release Created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tag**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📄 Assets:" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}.elf\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "👉 Open the draft on GitHub, write notes, optionally tick prerelease, then Publish." >> $GITHUB_STEP_SUMMARY
