name: PlatformIO Build

on:
  push:
    branches: [ development, main ]
    paths:
      - 'source/**'
      - '.github/workflows/platformio-build.yml'
  pull_request:
    branches: [ development, main ]
    paths:
      - 'source/**'
      - '.github/workflows/platformio-build.yml'

jobs:
  # Job 1: Validation build on PRs (quick feedback)
  build-check:
    runs-on: ubuntu-latest
    name: Build Check (${{ matrix.env }})
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        env: [ esp32s3-dev, esp32s3-prod ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11.7' # Same version as PlatformIO installs on its own via VSCode extension

    - name: Cache PlatformIO
      uses: actions/cache@v5
      with:
        path: |
          ~/.platformio
          ~/.cache/pip
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Extract version
      id: version
      working-directory: source
      run: |
        VERSION=$(grep -oP 'FIRMWARE_BUILD_VERSION_MAJOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_MINOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_PATCH "\K\w+' include/constants.h)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "📌 Detected version: $VERSION"

    - name: Build firmware (${{ matrix.env }})
      working-directory: source
      run: |
        echo "🏗️ Building firmware for ${{ matrix.env }}..."
        pio run -e ${{ matrix.env }}
        echo "✅ Build completed for ${{ matrix.env }}!"

    - name: Prepare artifacts (${{ matrix.env }})
      working-directory: source
      run: |
        mkdir -p artifacts/${{ matrix.env }}
        cp .pio/build/${{ matrix.env }}/firmware.bin artifacts/${{ matrix.env }}/energyme_home_${{ steps.version.outputs.VERSION }}.bin
        cp .pio/build/${{ matrix.env }}/firmware.elf artifacts/${{ matrix.env }}/energyme_home_${{ steps.version.outputs.VERSION }}.elf
        cp .pio/build/${{ matrix.env }}/partitions.bin artifacts/${{ matrix.env }}/partitions.bin
        cp .pio/build/${{ matrix.env }}/bootloader.bin artifacts/${{ matrix.env }}/bootloader.bin

    - name: Upload artifacts (${{ matrix.env }})
      uses: actions/upload-artifact@v7
      with:
        name: firmware-${{ matrix.env }}-check-${{ steps.version.outputs.VERSION }}-${{ github.sha }}
        path: source/artifacts/${{ matrix.env }}/
        retention-days: 7

  # Job 2: Full build on push to main/development (produces retained artifacts)
  build:
    runs-on: ubuntu-latest
    name: Build (${{ matrix.env }})
    permissions:
      contents: read
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    strategy:
      fail-fast: false
      matrix:
        env: [ esp32s3-dev, esp32s3-prod ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11.7' # Same version as PlatformIO installs on its own via VSCode extension

    - name: Cache PlatformIO
      uses: actions/cache@v5
      with:
        path: |
          ~/.platformio
          ~/.cache/pip
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Extract version
      id: version
      working-directory: source
      run: |
        VERSION=$(grep -oP 'FIRMWARE_BUILD_VERSION_MAJOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_MINOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_PATCH "\K\w+' include/constants.h)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "📌 Detected version: $VERSION"

    - name: Build firmware (${{ matrix.env }})
      working-directory: source
      run: |
        echo "🏗️ Building firmware for ${{ matrix.env }}..."
        pio run -e ${{ matrix.env }}
        echo "✅ Build completed for ${{ matrix.env }}!"

    - name: Prepare artifacts (${{ matrix.env }})
      working-directory: source
      run: |
        mkdir -p artifacts/${{ matrix.env }}
        cp .pio/build/${{ matrix.env }}/firmware.bin artifacts/${{ matrix.env }}/energyme_home_${{ steps.version.outputs.VERSION }}.bin
        cp .pio/build/${{ matrix.env }}/firmware.elf artifacts/${{ matrix.env }}/energyme_home_${{ steps.version.outputs.VERSION }}.elf
        cp .pio/build/${{ matrix.env }}/partitions.bin artifacts/${{ matrix.env }}/partitions.bin
        cp .pio/build/${{ matrix.env }}/bootloader.bin artifacts/${{ matrix.env }}/bootloader.bin

    - name: Upload firmware artifact (${{ matrix.env }})
      uses: actions/upload-artifact@v7
      with:
        name: firmware-${{ matrix.env }}-${{ steps.version.outputs.VERSION }}-${{ github.sha }}
        path: source/artifacts/${{ matrix.env }}/
        retention-days: 30

    - name: Build summary
      run: |
        echo "### 🎉 Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Environment**: \`${{ matrix.env }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Build (${{ matrix.env }})" >> $GITHUB_STEP_SUMMARY
        echo "✅ Firmware built successfully" >> $GITHUB_STEP_SUMMARY
        echo "📦 Artifact: \`firmware-${{ matrix.env }}-${{ steps.version.outputs.VERSION }}-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "📄 Files:" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}.elf\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`partitions.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "⏱️ Retention: 30 days" >> $GITHUB_STEP_SUMMARY
