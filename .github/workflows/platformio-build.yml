name: PlatformIO Build (Legacy PCB v5)

on:
  push:
    branches: [ legacy/pcb-v5 ]
  pull_request:
    branches: [ legacy/pcb-v5 ]

jobs:
  # Job 1: Quick validation build on PRs — nosecrets only, no secrets injection needed
  build-check:
    runs-on: ubuntu-latest
    name: Build Check
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11.7'

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          ~/.cache/pip
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Extract version
      id: version
      working-directory: source
      run: |
        VERSION=$(grep -oP 'FIRMWARE_BUILD_VERSION_MAJOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_MINOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_PATCH "\K\w+' include/constants.h)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "📌 Detected version: $VERSION"

    - name: Build firmware (esp32s3-prod-nosecrets)
      working-directory: source
      run: |
        echo "🏗️ Building esp32s3-prod-nosecrets..."
        pio run -e esp32s3-prod-nosecrets
        echo "✅ Build check passed!"

    - name: Prepare artifacts
      working-directory: source
      run: |
        mkdir -p artifacts
        cp .pio/build/esp32s3-prod-nosecrets/firmware.bin artifacts/energyme_home_${{ steps.version.outputs.VERSION }}_nosecrets.bin
        cp .pio/build/esp32s3-prod-nosecrets/partitions.bin artifacts/partitions.bin
        cp .pio/build/esp32s3-prod-nosecrets/bootloader.bin artifacts/bootloader.bin

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-check-${{ steps.version.outputs.VERSION }}-${{ github.sha }}
        path: source/artifacts/
        retention-days: 7

  # Job 2: Full release build on push — prod with real secrets (private) + nosecrets (public)
  build-release:
    runs-on: ubuntu-latest
    name: Build Release
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11.7'

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          ~/.cache/pip
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Extract version
      id: version
      working-directory: source
      run: |
        VERSION=$(grep -oP 'FIRMWARE_BUILD_VERSION_MAJOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_MINOR "\K\w+' include/constants.h).$(grep -oP 'FIRMWARE_BUILD_VERSION_PATCH "\K\w+' include/constants.h)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "📌 Detected version: $VERSION"

    - name: Inject real secrets
      working-directory: source
      env:
        PRIVATE_CLAIM_PEM: ${{ secrets.PRIVATE_CLAIM_PEM }}
        CERT_CLAIM_PEM: ${{ secrets.CERT_CLAIM_PEM }}
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      run: |
        echo "🔐 Injecting real secrets..."
        mkdir -p secrets
        printf "%s" "$PRIVATE_CLAIM_PEM" > secrets/privateclaim.pem
        printf "%s" "$CERT_CLAIM_PEM" > secrets/certclaim.pem
        printf "%s" "$ENCRYPTION_KEY" > secrets/encryptionkey.txt
        echo "✅ Secrets injected successfully"

    - name: Build firmware (esp32s3-prod — with secrets)
      working-directory: source
      run: |
        echo "🏗️ Building esp32s3-prod with real secrets..."
        pio run -e esp32s3-prod
        echo "✅ Build completed!"

    - name: Build firmware (esp32s3-prod-nosecrets)
      working-directory: source
      run: |
        echo "🏗️ Building esp32s3-prod-nosecrets..."
        pio run -e esp32s3-prod-nosecrets
        echo "✅ Build completed!"

    - name: Cleanup secrets
      if: always()
      working-directory: source
      run: rm -rf secrets/

    - name: Prepare private artifact
      working-directory: source
      run: |
        mkdir -p artifacts/private
        cp .pio/build/esp32s3-prod/firmware.bin artifacts/private/energyme_home_${{ steps.version.outputs.VERSION }}.bin
        cp .pio/build/esp32s3-prod/firmware.elf artifacts/private/energyme_home_${{ steps.version.outputs.VERSION }}.elf
        cp .pio/build/esp32s3-prod/partitions.bin artifacts/private/partitions.bin
        cp .pio/build/esp32s3-prod/bootloader.bin artifacts/private/bootloader.bin

    - name: Prepare public artifact (nosecrets)
      working-directory: source
      run: |
        mkdir -p artifacts/public
        cp .pio/build/esp32s3-prod-nosecrets/firmware.bin artifacts/public/energyme_home_${{ steps.version.outputs.VERSION }}_nosecrets.bin
        cp .pio/build/esp32s3-prod-nosecrets/firmware.elf artifacts/public/energyme_home_${{ steps.version.outputs.VERSION }}_nosecrets.elf
        cp .pio/build/esp32s3-prod-nosecrets/partitions.bin artifacts/public/partitions.bin
        cp .pio/build/esp32s3-prod-nosecrets/bootloader.bin artifacts/public/bootloader.bin

    - name: Upload private artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-private-${{ steps.version.outputs.VERSION }}-${{ github.sha }}
        path: source/artifacts/private/
        retention-days: 30

    - name: Upload public artifact (nosecrets)
      uses: actions/upload-artifact@v4
      with:
        name: firmware-nosecrets-${{ steps.version.outputs.VERSION }}-${{ github.sha }}
        path: source/artifacts/public/
        retention-days: 30

    - name: Build summary
      run: |
        echo "### 🎉 Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: \`legacy/pcb-v5\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### 🔐 Private Build (with secrets)" >> $GITHUB_STEP_SUMMARY
        echo "📦 Artifact: \`firmware-private-${{ steps.version.outputs.VERSION }}-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}.elf\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`partitions.bin\` + \`bootloader.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "🔒 Accessible to repository members only — retained 30 days" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### 🌐 Public Build (nosecrets)" >> $GITHUB_STEP_SUMMARY
        echo "📦 Artifact: \`firmware-nosecrets-${{ steps.version.outputs.VERSION }}-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}_nosecrets.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`energyme_home_${{ steps.version.outputs.VERSION }}_nosecrets.elf\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`partitions.bin\` + \`bootloader.bin\`" >> $GITHUB_STEP_SUMMARY
        echo "⏱️ Retained 30 days" >> $GITHUB_STEP_SUMMARY